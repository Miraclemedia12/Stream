<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stream Africa | Secure Payout</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap');
        :root { --stream-green: #b8d5b0; --stream-dark: #0a1f1c; --stream-red: #ff4b4b; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background-color: var(--stream-dark); color: #fff; margin: 0; padding: 15px; min-height: 100vh; overflow-x: hidden; }

        /* TOAST NOTIFICATION */
        #streamToast {
            position: fixed; top: -120px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 350px; background: #0d1211;
            border: 1px solid var(--stream-green); border-radius: 20px;
            padding: 20px; z-index: 10000; transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        #streamToast.show { top: 20px; }
        #streamToast.error { border-color: var(--stream-red); }

        /* PROFESSIONAL RECEIPT MODAL */
        #receiptModal { 
            position: fixed; inset: 0; background: rgba(0,0,0,0.95); 
            display: none; align-items: center; justify-content: center; z-index: 5000; padding: 20px;
        }
        .receipt-paper { 
            background: #fff; color: #000; width: 100%; max-width: 360px; 
            border-radius: 30px; padding: 35px 30px; position: relative;
        }

        /* LEDGER STYLING */
        .history-card {
            background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05);
            border-radius: 24px; padding: 20px; margin-top: 30px;
        }
        .history-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 0; border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .status-pill {
            font-size: 9px; font-weight: 900; padding: 4px 10px; border-radius: 100px;
            text-transform: uppercase; background: rgba(255, 165, 0, 0.1); color: #ffa500;
        }

        .glass-input { 
            background: rgba(255,255,255,0.03); border: 1px solid rgba(184, 213, 176, 0.1);
            width: 100%; padding: 22px; border-radius: 20px; color: #fff; font-size: 24px; font-weight: 800;
            outline: none; text-align: center;
        }
        .glass-input:disabled { opacity: 0.5; cursor: not-allowed; }
    </style>
</head>
<body class="pb-10">

    <div id="streamToast">
        <div class="flex items-center gap-4">
            <div class="w-10 h-10 rounded-full bg-[#b8d5b0]/10 flex items-center justify-center text-[#b8d5b0]"><i class="fas fa-shield-exclamation" id="toastIcon"></i></div>
            <div>
                <b class="text-[10px] uppercase tracking-widest text-[#b8d5b0]" id="toastTitle">System Protocol</b>
                <p id="toastMsg" class="text-xs text-white/70 font-bold">Initializing...</p>
            </div>
        </div>
    </div>

    <div id="receiptModal">
        <div class="receipt-paper">
            <div class="text-center mb-6">
                <div id="r-icon" class="w-16 h-16 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center mx-auto mb-4 text-2xl">
                    <i class="fas fa-spinner fa-spin"></i>
                </div>
                <h2 id="r-main-title" class="font-black text-2xl tracking-tighter uppercase text-gray-800">Request Initialized</h2>
                <p class="text-[10px] text-gray-400 font-bold tracking-widest mt-1" id="r-datetime">...</p>
            </div>

            <div class="space-y-4 border-t border-b border-dashed border-gray-200 py-6 mb-6">
                <div class="flex justify-between items-center">
                    <span class="text-[11px] font-bold text-gray-400 uppercase">Reference</span>
                    <span id="r-ref" class="text-[11px] font-black font-mono">...</span>
                </div>
                <div class="flex justify-between items-center">
                    <span class="text-[11px] font-bold text-gray-400 uppercase">Beneficiary</span>
                    <span id="r-user" class="text-[11px] font-black uppercase">...</span>
                </div>
                <div class="flex justify-between items-center">
                    <span class="text-[11px] font-bold text-gray-400 uppercase">Bank Detail</span>
                    <span id="r-bank" class="text-[11px] font-black text-right truncate ml-4">...</span>
                </div>
                <div class="flex justify-between items-center">
                    <span class="text-[11px] font-bold text-gray-400 uppercase">Status</span>
                    <span id="r-status-badge" class="text-[10px] bg-blue-100 text-blue-600 px-2 py-1 rounded font-black uppercase tracking-widest">Awaiting Confirmation</span>
                </div>
            </div>

            <div class="bg-gray-50 p-6 rounded-2xl text-center mb-8">
                <p class="text-[10px] font-bold text-gray-400 uppercase mb-1">Amount to Debit</p>
                <h3 class="text-4xl font-black" id="r-amt">₦0.00</h3>
            </div>

            <div id="modal-actions">
                <button onclick="finalConfirm()" class="w-full bg-black text-white py-5 rounded-2xl font-black text-xs uppercase tracking-widest mb-3 shadow-lg">Confirm & Proceed</button>
                <button onclick="document.getElementById('receiptModal').style.display='none'" class="w-full text-gray-400 py-2 rounded-2xl font-bold text-[10px] uppercase">Cancel Request</button>
            </div>
            
            <button id="done-btn" onclick="window.location.href='main-dashboard.html'" class="hidden w-full bg-[#0a1f1c] text-white py-5 rounded-2xl font-black text-xs uppercase tracking-widest">Return to Dashboard</button>
        </div>
    </div>

    <div class="flex items-center justify-between mb-8 mt-5">
        <a href="main-dashboard.html" class="w-12 h-12 flex items-center justify-center bg-white/5 rounded-2xl border border-white/10"><i class="fas fa-chevron-left text-[#b8d5b0]"></i></a>
        <h1 class="text-sm font-black tracking-widest uppercase text-white/40">Secure Payout</h1>
        <div class="w-12"></div>
    </div>

    <div class="bg-[#b8d5b0]/5 border border-[#b8d5b0]/20 rounded-[35px] p-10 text-center mb-8">
        <p class="text-[10px] font-black text-[#b8d5b0] uppercase tracking-[3px] mb-2">Withdrawable Balance</p>
        <h2 class="text-5xl font-black" id="currentBalDisplay">₦12,000.00</h2>
    </div>

    <div class="space-y-5">
        <input type="number" id="w-amount" class="glass-input" value="12000">
        <div class="bg-white/5 border border-white/10 rounded-3xl p-6 flex items-center gap-5">
            <div class="w-14 h-14 bg-[#b8d5b0]/10 rounded-2xl flex items-center justify-center text-[#b8d5b0] text-2xl"><i class="fas fa-university"></i></div>
            <div><p id="bank-status" class="text-xs font-black text-white/80">Syncing Node...</p></div>
        </div>
        <button id="initiateBtn" onclick="handleWithdrawal()" class="w-full bg-[#b8d5b0] text-[#0a1f1c] py-6 rounded-[28px] font-black text-sm uppercase tracking-widest shadow-xl shadow-[#b8d5b0]/5">Initiate Payout</button>
    </div>

    <div class="history-card">
        <h3 class="text-[10px] font-black uppercase tracking-[2px] text-white/40 mb-5 px-2">Transaction History</h3>
        <div id="history-list" class="space-y-2">
            <p id="no-history" class="text-center py-5 text-white/10 text-[10px] font-bold uppercase tracking-widest">No Records Found</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyASDlQQMoXCeMZKs5O3KmO8zuFztt8rg2E", authDomain: "celeste-web1.firebaseapp.com", projectId: "celeste-web1", storageBucket: "celeste-web1.firebasestorage.app", messagingSenderId: "905722043319", appId: "1:905722043319:web:83d032bf3608b8957b2632" };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentUser = null;
        let userData = null;
        let availableBalance = 12000; 

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                // Check if already withdrawn in this session or local storage
                if(localStorage.getItem(`withdrawn_${user.uid}`)) {
                    applyZeroBalance();
                }
                const snap = await getDoc(doc(db, "users", user.uid));
                if (snap.exists()) {
                    userData = snap.data();
                    document.getElementById('bank-status').innerText = userData.bankName ? `${userData.bankName} (${userData.accountNumber})` : "Bank Details Missing";
                }
                loadLocalHistory();
            } else { window.location.href = 'index.html'; }
        });

        function applyZeroBalance() {
            availableBalance = 0;
            document.getElementById('currentBalDisplay').innerText = "₦0.00";
            document.getElementById('w-amount').value = 0;
            document.getElementById('w-amount').disabled = true;
            document.getElementById('initiateBtn').disabled = true;
            document.getElementById('initiateBtn').style.opacity = "0.3";
        }

        window.handleWithdrawal = () => {
            const amount = parseInt(document.getElementById('w-amount').value);
            if (!userData?.bankName) return showStreamAlert("Link bank details first", "error");
            if (availableBalance <= 0) return showStreamAlert("Insufficient funds", "error");
            if (amount < 12000) return showStreamAlert("Minimum payout is ₦12,000", "error");

            // STAGE 1: INITIAL UI (Awaiting Confirmation)
            document.getElementById('r-main-title').innerText = "Request Initialized";
            document.getElementById('r-status-badge').innerText = "Awaiting Confirmation";
            document.getElementById('r-status-badge').className = "text-[10px] bg-blue-100 text-blue-600 px-2 py-1 rounded font-black uppercase tracking-widest";
            document.getElementById('r-icon').className = "w-16 h-16 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center mx-auto mb-4 text-2xl";
            document.getElementById('r-icon').innerHTML = '<i class="fas fa-spinner fa-spin"></i>';

            // Set Data
            const now = new Date();
            document.getElementById('r-datetime').innerText = `${now.toLocaleDateString()} • ${now.toLocaleTimeString()}`.toUpperCase();
            document.getElementById('r-user').innerText = userData.fullName || "MEMBER";
            document.getElementById('r-bank').innerText = `${userData.bankName} (${userData.accountNumber})`;
            document.getElementById('r-amt').innerText = "₦" + amount.toLocaleString();
            document.getElementById('r-ref').innerText = `STRM-AF-${Math.random().toString(36).substr(2, 9).toUpperCase()}`;
            
            document.getElementById('receiptModal').style.display = 'flex';
        };

        window.finalConfirm = () => {
            // STAGE 2: SUCCESS UI (Withdrawal Successful + Approved in Green)
            document.getElementById('r-main-title').innerText = "Withdrawal Successful";
            document.getElementById('r-status-badge').innerText = "Approved";
            // Green Status Color applied here
            document.getElementById('r-status-badge').className = "text-[10px] bg-green-100 text-green-600 px-2 py-1 rounded font-black uppercase tracking-widest";
            document.getElementById('r-icon').className = "w-16 h-16 bg-green-100 text-green-600 rounded-full flex items-center justify-center mx-auto mb-4 text-2xl";
            document.getElementById('r-icon').innerHTML = '<i class="fas fa-check-double"></i>';

            const amountValue = document.getElementById('r-amt').innerText;
            const refValue = document.getElementById('r-ref').innerText;
            
            // Save transaction to local history
            const record = { amount: amountValue, ref: refValue, date: new Date().toLocaleDateString(), status: 'Pending' };
            let history = JSON.parse(localStorage.getItem(`history_${currentUser.uid}`)) || [];
            history.unshift(record);
            localStorage.setItem(`history_${currentUser.uid}`, JSON.stringify(history));

            // Set the lock flags for dashboard and future withdrawals
            localStorage.setItem(`needs_support_verify_${currentUser.uid}`, "true");
            localStorage.setItem(`withdrawn_${currentUser.uid}`, "true");

            // Permanently reset balance to zero for this user
            applyZeroBalance();

            // Switch buttons
            document.getElementById('modal-actions').classList.add('hidden');
            document.getElementById('done-btn').classList.remove('hidden');
        };

        window.showStreamAlert = (msg, type = 'info') => {
            const toast = document.getElementById('streamToast');
            document.getElementById('toastMsg').innerText = msg;
            toast.classList.toggle('error', type === 'error');
            document.getElementById('toastTitle').innerText = type === 'error' ? "SECURITY ALERT" : "SYSTEM PROTOCOL";
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        };

        function loadLocalHistory() {
            const history = JSON.parse(localStorage.getItem(`history_${currentUser.uid}`)) || [];
            if(history.length > 0) {
                document.getElementById('no-history').style.display = 'none';
                document.getElementById('history-list').innerHTML = history.map(item => `
                    <div class="history-item">
                        <div>
                            <p class="text-[11px] font-black text-white/90">${item.amount}</p>
                            <p class="text-[9px] text-white/30 font-bold">${item.date} • ${item.ref}</p>
                        </div>
                        <span class="status-pill">Pending</span>
                    </div>
                `).join('');
            }
        }
    </script>
</body>
</html>
