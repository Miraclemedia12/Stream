<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REGISTER | STREAM AFRICA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap');

        body {
            margin: 0; padding: 0;
            background: #0a1f1c;
            font-family: 'Inter', sans-serif;
            color: #ffffff;
            min-height: 100vh;
            display: flex; flex-direction: column; align-items: center;
        }

        /* --- STYLES REMAIN SAME AS BEFORE --- */
        .topbar { width: 100%; background: #0a1f1c; padding: 15px 5%; display: flex; flex-direction: column; align-items: center; border-bottom: 2px solid #b8d5b0; }
        .logo-container { height: 60px; margin-bottom: 15px; }
        .logo-img { height: 100%; width: auto; filter: brightness(0) invert(1); }
        .navbar { display: flex; justify-content: center; gap: 25px; width: 100%; }
        .navbar a { color: #ffffff; text-decoration: none; font-weight: bold; font-size: 14px; text-transform: uppercase; }
        .navbar a.active { border-bottom: 3px solid #b8d5b0; color: #b8d5b0; }

        .register-container {
            width: 95%; max-width: 450px; margin: 40px auto;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid #b8d5b0; border-radius: 20px;
            padding: 35px 25px; box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
        }

        .main-title { font-size: 24px; font-weight: 900; text-align: center; margin-bottom: 30px; text-transform: uppercase; color: #ffffff; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-size: 12px; font-weight: 800; color: #b8d5b0; text-transform: uppercase; }
        .form-group input { width: 100%; padding: 14px; border: 1px solid rgba(184, 213, 176, 0.2); border-radius: 12px; background: rgba(255, 255, 255, 0.03); color: #fff; }
        
        .register-button { width: 100%; padding: 18px; background: #b8d5b0; color: #0a1f1c; border-radius: 12px; font-weight: 900; text-transform: uppercase; cursor: pointer; }

        /* --- NEW PROFESSIONAL MODAL SYSTEM --- */
        #custom-modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85); z-index: 3000;
            backdrop-filter: blur(5px); justify-content: center; align-items: center;
        }

        .modal-card {
            background: #0a1f1c; border: 2px solid #b8d5b0; width: 90%; max-width: 400px;
            border-radius: 24px; padding: 30px; text-align: center;
            transform: scale(0.8); transition: 0.3s;
        }

        .modal-card.active { transform: scale(1); }
        .modal-logo { height: 50px; margin: 0 auto 20px; filter: brightness(0) invert(1); }
        .modal-title { color: #b8d5b0; font-weight: 900; font-size: 20px; margin-bottom: 10px; text-transform: uppercase; }
        .modal-text { color: #ffffff; font-size: 15px; margin-bottom: 25px; line-height: 1.5; }
        .modal-btn { 
            background: #b8d5b0; color: #0a1f1c; padding: 12px 30px; border-radius: 10px; 
            font-weight: 800; border: none; cursor: pointer; text-transform: uppercase;
        }

        /* Loading Feed styling */
        .activity-feed-container {
            position: fixed; top: 20px; left: -400px; z-index: 2000; width: 320px; padding: 12px;
            background: #0a1f1c; border: 2px solid #b8d5b0; border-radius: 15px;
            display: flex; align-items: center; transition: left 0.6s; 
        }
        .show-activity { left: 20px; }
    </style>
</head>
<body>

<header class="topbar">
    <div class="logo-container"><img src="logo.png" alt="Logo" class="logo-img"></div>
    <div class="navbar">
        <a href="index.html">HOME</a>
        <a href="reward.html">REWARD</a>
        <a href="register.html" class="active">REGISTER</a>
    </div>
</header>

<div class="register-container">
    <div class="main-title">Create Account</div>
    <form id="registration-form">
        <div class="form-group"><label>Full Name</label><input type="text" id="full-name" required></div>
        <div class="form-group"><label>Username</label><input type="text" id="username" required></div>
        <div class="form-group"><label>Email Address</label><input type="email" id="email" required></div>
        <div class="form-group"><label>Phone Number</label><input type="tel" id="phone-number" required></div>
        <div class="form-group"><label>Password</label><input type="password" id="password" required></div>
        <button type="submit" id="reg-btn" class="register-button">REGISTER</button>
    </form>
</div>

<div id="custom-modal-overlay">
    <div class="modal-card" id="modal-card">
        <img src="logo.png" class="modal-logo" alt="Stream Logo">
        <div class="modal-title" id="m-title">Alert</div>
        <p class="modal-text" id="m-text">Sample Message</p>
        <button class="modal-btn" onclick="closeModal()">OK, GOT IT</button>
    </div>
</div>

<div id="activity-feed" class="activity-feed-container">
    <div class="activity-icon"><i id="act-icon" class="fas fa-circle-notch fa-spin"></i></div>
    <div id="activity-text">Processing...</div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
    import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyASDlQQMoXCeMZKs5O3KmO8zuFztt8rg2E",
        authDomain: "celeste-web1.firebaseapp.com",
        projectId: "celeste-web1",
        storageBucket: "celeste-web1.firebasestorage.app",
        messagingSenderId: "905722043319",
        appId: "1:905722043319:web:83d032bf3608b8957b2632"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // Function to show Branded Modal
    window.showBrandedModal = function(title, message) {
        document.getElementById('m-title').innerText = title;
        document.getElementById('m-text').innerText = message;
        document.getElementById('custom-modal-overlay').style.display = 'flex';
        setTimeout(() => { document.getElementById('modal-card').classList.add('active'); }, 10);
    }

    window.closeModal = function() {
        document.getElementById('modal-card').classList.remove('active');
        setTimeout(() => { document.getElementById('custom-modal-overlay').style.display = 'none'; }, 300);
    }

    document.getElementById('registration-form').addEventListener('submit', async function(e) {
        e.preventDefault();
        
        const btn = document.getElementById('reg-btn');
        const feed = document.getElementById('activity-feed');
        const feedText = document.getElementById('activity-text');

        btn.disabled = true;
        btn.innerText = "CREATING ACCOUNT...";
        feedText.innerText = "Securing your dashboard details...";
        feed.classList.add('show-activity');

        const fullName = document.getElementById('full-name').value;
        const userName = document.getElementById('username').value;
        const email = document.getElementById('email').value;
        const phone = document.getElementById('phone-number').value;
        const password = document.getElementById('password').value;

        try {
            const userCredential = await createUserWithEmailAndPassword(auth, email, password);
            const user = userCredential.user;

            await setDoc(doc(db, "users", user.uid), {
                fullName, username: userName, email, phone,
                status: "Pending", balance: 0, is_active: false,
                regDate: new Date().toLocaleDateString()
            });

            feedText.innerText = "Success! Redirecting...";
            setTimeout(() => { window.location.href = 'dashboard.html'; }, 1500);

        } catch (error) {
            btn.disabled = false;
            btn.innerText = "REGISTER";
            feed.classList.remove('show-activity');

            if (error.code === 'auth/email-already-in-use') {
                showBrandedModal("Account Exists", "This email is already registered with STREAM. Please try logging in or use a different email address.");
            } else {
                showBrandedModal("Registration Error", error.message);
            }
        }
    });
</script>
</body>
</html>
