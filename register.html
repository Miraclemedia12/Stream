<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REGISTER | STREAM AFRICA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap');

        body {
            margin: 0; padding: 0;
            background: #0a1f1c;
            font-family: 'Plus Jakarta Sans', sans-serif;
            color: #ffffff;
            min-height: 100vh;
            display: flex; flex-direction: column; align-items: center;
        }

        .topbar { width: 100%; background: #0a1f1c; padding: 15px 5%; display: flex; flex-direction: column; align-items: center; border-bottom: 2px solid #b8d5b0; }
        .logo-img { height: 40px; filter: brightness(0) invert(1); margin-bottom: 12px; }
        .navbar { display: flex; justify-content: center; gap: 25px; width: 100%; }
        .navbar a { color: #ffffff; text-decoration: none; font-weight: bold; font-size: 13px; text-transform: uppercase; letter-spacing: 1px; }
        .navbar a.active { border-bottom: 3px solid #b8d5b0; color: #b8d5b0; padding-bottom: 5px; }

        .register-container {
            width: 95%; max-width: 450px; margin: 30px auto;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(184, 213, 176, 0.2); border-radius: 25px;
            padding: 35px 25px; box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        .main-title { font-size: 24px; font-weight: 900; text-align: center; margin-bottom: 30px; text-transform: uppercase; color: #ffffff; letter-spacing: -1px; }
        .form-group { margin-bottom: 20px; position: relative; }
        .form-group label { display: block; margin-bottom: 8px; font-size: 11px; font-weight: 800; color: #b8d5b0; text-transform: uppercase; letter-spacing: 1px; }
        .form-group input { width: 100%; padding: 15px; border: 1px solid rgba(184, 213, 176, 0.2); border-radius: 12px; background: rgba(255, 255, 255, 0.03); color: #fff; font-weight: 600; outline: none; transition: 0.3s; }
        .form-group input:focus { border-color: #b8d5b0; background: rgba(184, 213, 176, 0.05); }
        
        .eye-icon { position: absolute; right: 15px; top: 42px; color: rgba(255,255,255,0.3); cursor: pointer; font-size: 18px; }
        .eye-icon:hover { color: #b8d5b0; }

        .register-button { width: 100%; padding: 18px; background: #b8d5b0; color: #0a1f1c; border-radius: 12px; font-weight: 900; text-transform: uppercase; cursor: pointer; border: none; letter-spacing: 1px; transition: 0.3s; }
        .register-button:disabled { opacity: 0.5; cursor: not-allowed; }

        .login-link { display: block; text-align: center; margin-top: 20px; font-size: 14px; color: #ffffff; text-decoration: none; }
        .login-link span { color: #b8d5b0; font-weight: bold; }

        #activity-feed { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(100px); z-index: 2000; width: 300px; padding: 15px; background: #0a1f1c; border: 1px solid #b8d5b0; border-radius: 15px; display: flex; align-items: center; gap: 12px; transition: 0.5s; }
        #activity-feed.show-activity { transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>

<header class="topbar">
    <div class="logo-container"><img src="logo.png" alt="Stream Logo" class="logo-img"></div>
    <div class="navbar">
        <a href="index.html">HOME</a>
        <a href="reward.html">REWARD</a>
        <a href="register.html" class="active">REGISTER</a>
    </div>
</header>

<div class="register-container">
    <div class="main-title">Create Account</div>
    <form id="registration-form">
        <div class="form-group"><label>Full Name</label><input type="text" id="full-name" placeholder="Miracle Okon" required></div>
        <div class="form-group"><label>Username</label><input type="text" id="username" placeholder="Choose username" required></div>
        <div class="form-group"><label>Email Address</label><input type="email" id="email" placeholder="email@example.com" required></div>
        
        <div class="form-group"><label>Phone Number</label><input type="tel" id="phone-number" placeholder="WhatsApp Number" required></div>
        
        <div class="form-group">
            <label>Password</label>
            <input type="password" id="password" required>
            <i class="fas fa-eye eye-icon" id="togglePassword"></i>
        </div>
        
        <button type="submit" id="reg-btn" class="register-button">REGISTER</button>
        
        <a href="login.html" class="login-link">Already have an account? <span>Login</span></a>
    </form>
</div>

<div id="activity-feed">
    <div class="text-[#b8d5b0]"><i class="fas fa-circle-notch fa-spin"></i></div>
    <div id="activity-text" class="text-xs font-bold uppercase">Processing...</div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
    import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyASDlQQMoXCeMZKs5O3KmO8zuFztt8rg2E",
        authDomain: "celeste-web1.firebaseapp.com",
        projectId: "celeste-web1",
        storageBucket: "celeste-web1.firebasestorage.app",
        messagingSenderId: "905722043319",
        appId: "1:905722043319:web:83d032bf3608b8957b2632"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const togglePassword = document.querySelector('#togglePassword');
    const password = document.querySelector('#password');

    togglePassword.addEventListener('click', function () {
        const type = password.getAttribute('type') === 'password' ? 'text' : 'password';
        password.setAttribute('type', type);
        this.classList.toggle('fa-eye-slash');
    });

    document.getElementById('registration-form').addEventListener('submit', async function(e) {
        e.preventDefault();
        const btn = document.getElementById('reg-btn');
        const feed = document.getElementById('activity-feed');
        const feedText = document.getElementById('activity-text');

        btn.disabled = true;
        btn.innerText = "AUTHENTICATING...";
        feedText.innerText = "Securing Node...";
        feed.classList.add('show-activity');

        const fullName = document.getElementById('full-name').value;
        const userName = document.getElementById('username').value;
        const email = document.getElementById('email').value;
        const phone = document.getElementById('phone-number').value;
        const passVal = document.getElementById('password').value;

        try {
            const userCredential = await createUserWithEmailAndPassword(auth, email, passVal);
            const user = userCredential.user;

            localStorage.setItem(`paid_${user.uid}`, 'false');
            localStorage.setItem(`legalName_${user.uid}`, fullName);

            await setDoc(doc(db, "users", user.uid), {
                fullName, username: userName, email, phone,
                paidStatus: false, balance: 0,
                regDate: new Date().toLocaleDateString()
            });

            feedText.innerText = "Success! Redirecting...";
            setTimeout(() => { window.location.href = 'first-dashboard.html'; }, 1500);

        } catch (error) {
            btn.disabled = false;
            btn.innerText = "REGISTER";
            feed.classList.remove('show-activity');
            alert(error.message);
        }
    });
</script>
</body>
</html>
