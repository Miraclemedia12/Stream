<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REGISTER | STREAM AFRICA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap');

        body {
            margin: 0; padding: 0;
            background: #0a1f1c;
            font-family: 'Plus Jakarta Sans', sans-serif;
            color: #ffffff;
            min-height: 100vh;
            display: flex; flex-direction: column; align-items: center;
        }

        .topbar { width: 100%; background: #0a1f1c; padding: 15px 5%; display: flex; flex-direction: column; align-items: center; border-bottom: 2px solid #b8d5b0; }
        .logo-img { height: 40px; filter: brightness(0) invert(1); margin-bottom: 10px; }
        .navbar { display: flex; justify-content: center; gap: 25px; width: 100%; }
        .navbar a { color: #ffffff; text-decoration: none; font-weight: bold; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; }
        .navbar a.active { border-bottom: 2px solid #b8d5b0; color: #b8d5b0; padding-bottom: 5px; }

        .register-container {
            width: 95%; max-width: 450px; margin: 30px auto;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(184, 213, 176, 0.2); border-radius: 30px;
            padding: 40px 25px; box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        .main-title { font-size: 26px; font-weight: 900; text-align: center; margin-bottom: 8px; tracking: -1px; }
        .sub-title { text-align: center; font-size: 10px; color: #b8d5b0; font-weight: 800; text-transform: uppercase; letter-spacing: 3px; margin-bottom: 35px; }
        
        .form-group { margin-bottom: 22px; position: relative; }
        .form-group label { display: block; margin-bottom: 8px; font-size: 10px; font-weight: 800; color: rgba(255,255,255,0.4); text-transform: uppercase; letter-spacing: 1px; padding-left: 5px; }
        .form-group input { width: 100%; padding: 16px 18px; border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 16px; background: rgba(255, 255, 255, 0.03); color: #fff; font-weight: 600; outline: none; transition: 0.3s; }
        .form-group input:focus { border-color: #b8d5b0; background: rgba(184, 213, 176, 0.05); }
        
        /* Eye Icon Styling */
        .password-toggle { position: absolute; right: 18px; top: 43px; color: rgba(255,255,255,0.3); cursor: pointer; transition: 0.3s; }
        .password-toggle:hover { color: #b8d5b0; }

        .register-button { width: 100%; padding: 20px; background: #b8d5b0; color: #0a1f1c; border-radius: 18px; font-weight: 900; text-transform: uppercase; cursor: pointer; letter-spacing: 2px; box-shadow: 0 10px 20px rgba(184, 213, 176, 0.2); border: none; }

        .login-link { display: block; text-align: center; margin-top: 25px; font-size: 13px; color: rgba(255,255,255,0.4); font-weight: 600; }
        .login-link span { color: #b8d5b0; text-decoration: underline; }

        /* MODAL */
        #custom-modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0, 0, 0, 0.95); z-index: 5000; backdrop-filter: blur(8px); justify-content: center; align-items: center; }
        .modal-card { background: #0d1211; border: 1px solid #b8d5b0; width: 85%; max-width: 380px; border-radius: 28px; padding: 35px; text-align: center; transform: scale(0.9); transition: 0.3s; }
        .modal-card.active { transform: scale(1); }
        .modal-btn { background: #b8d5b0; color: #0a1f1c; width: 100%; padding: 15px; border-radius: 14px; font-weight: 800; border: none; margin-top: 20px; text-transform: uppercase; }

        #activity-feed { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(100px); z-index: 2000; width: 280px; padding: 15px; background: #0d1211; border: 1px solid #b8d5b0; border-radius: 20px; display: flex; align-items: center; gap: 12px; transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        #activity-feed.show-activity { transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>

<header class="topbar">
    <img src="logo.png" alt="Stream Africa" class="logo-img">
    <div class="navbar">
        <a href="index.html">HOME</a>
        <a href="register.html" class="active">REGISTER</a>
    </div>
</header>

<div class="register-container">
    <h1 class="main-title">Join the Network</h1>
    <p class="sub-title">Secure Node Registration</p>
    
    <form id="registration-form">
        <div class="form-group">
            <label>Legal Full Name</label>
            <input type="text" id="full-name" placeholder="Miracle Okon" required>
        </div>
        <div class="form-group">
            <label>Network Username</label>
            <input type="text" id="username" placeholder="e.g. CoachMiracle" required>
        </div>
        <div class="form-group">
            <label>Protocol Email</label>
            <input type="email" id="email" placeholder="access@stream.com" required>
        </div>
        <div class="form-group">
            <label>Security Password</label>
            <input type="password" id="password" placeholder="••••••••" required>
            <i class="fas fa-eye password-toggle" id="togglePassword"></i>
        </div>
        
        <button type="submit" id="reg-btn" class="register-button">Initialize Node</button>
        
        <a href="login.html" class="login-link">ALREADY REGISTERED? <span>ACCESS ACCOUNT</span></a>
    </form>
</div>

<div id="custom-modal-overlay">
    <div class="modal-card" id="modal-card">
        <div class="text-[#b8d5b0] text-4xl mb-4"><i class="fas fa-shield-halved"></i></div>
        <div class="modal-title font-black uppercase text-white mb-2" id="m-title">Alert</div>
        <p class="text-white/60 text-sm leading-relaxed" id="m-text"></p>
        <button class="modal-btn" onclick="closeModal()">Proceed</button>
    </div>
</div>

<div id="activity-feed">
    <div class="text-[#b8d5b0]"><i class="fas fa-circle-notch fa-spin"></i></div>
    <div id="activity-text" class="text-xs font-bold uppercase tracking-wider">Processing...</div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";
    import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyASDlQQMoXCeMZKs5O3KmO8zuFztt8rg2E",
        authDomain: "celeste-web1.firebaseapp.com",
        projectId: "celeste-web1",
        storageBucket: "celeste-web1.firebasestorage.app",
        messagingSenderId: "905722043319",
        appId: "1:905722043319:web:83d032bf3608b8957b2632"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // PASSWORD TOGGLE LOGIC
    const toggleBtn = document.getElementById('togglePassword');
    const passwordInput = document.getElementById('password');

    toggleBtn.addEventListener('click', function() {
        const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
        passwordInput.setAttribute('type', type);
        this.classList.toggle('fa-eye-slash');
    });

    window.showBrandedModal = function(title, message) {
        document.getElementById('m-title').innerText = title;
        document.getElementById('m-text').innerText = message;
        document.getElementById('custom-modal-overlay').style.display = 'flex';
        setTimeout(() => { document.getElementById('modal-card').classList.add('active'); }, 10);
    }

    window.closeModal = function() {
        document.getElementById('modal-card').classList.remove('active');
        setTimeout(() => { document.getElementById('custom-modal-overlay').style.display = 'none'; }, 300);
    }

    document.getElementById('registration-form').addEventListener('submit', async function(e) {
        e.preventDefault();
        const btn = document.getElementById('reg-btn');
        const feed = document.getElementById('activity-feed');
        const feedText = document.getElementById('activity-text');

        btn.disabled = true;
        btn.innerText = "AUTHENTICATING...";
        feedText.innerText = "Securing Node...";
        feed.classList.add('show-activity');

        const fullName = document.getElementById('full-name').value;
        const userName = document.getElementById('username').value;
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;

        try {
            const userCredential = await createUserWithEmailAndPassword(auth, email, password);
            const user = userCredential.user;

            // 1. SET GATEKEEPER STATUS (User has NOT paid yet)
            localStorage.setItem(`paid_${user.uid}`, 'false');
            
            // 2. SAVE PROFILE DATA TO LOCALSTORAGE (For Profile Page)
            localStorage.setItem(`legalName_${user.uid}`, fullName);
            localStorage.setItem(`username_${user.uid}`, userName);

            // 3. SAVE TO FIRESTORE
            await setDoc(doc(db, "users", user.uid), {
                fullName, username: userName, email,
                paidStatus: false, balance: 0,
                regDate: new Date().toLocaleDateString()
            });

            feedText.innerText = "Node Secured! Redirecting...";
            // Redirecting to first-dashboard because payment is FALSE
            setTimeout(() => { window.location.href = 'first-dashboard.html'; }, 1500);

        } catch (error) {
            btn.disabled = false;
            btn.innerText = "Initialize Node";
            feed.classList.remove('show-activity');
            showBrandedModal("Security Breach", error.message);
        }
    });
</script>
</body>
</html>
